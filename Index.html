<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Do You Love Me?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        body {
            font-family: 'Indie Flower', cursive;
            overflow: hidden;
            touch-action: manipulation;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .btn-transition {
            transition: transform 0.15s ease, opacity 0.15s ease;
            transform-origin: center;
            -webkit-transform-origin: center;
        }

        .chaos-text {
            position: absolute;
            pointer-events: none;
            animation: float 2s ease-in-out infinite;
            white-space: nowrap;
            font-weight: bold;
            opacity: 0.7;
            z-index: 10;
            will-change: transform;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(3deg); }
        }

        .hidden-element {
            display: none;
        }

        .final-scene {
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 10px;
            position: absolute;
            bottom: 15%;
            left: 0;
            right: 0;
            pointer-events: none;
            will-change: opacity, transform;
        }

        .final-scene-show {
            opacity: 1;
            transform: scale(1);
        }

        /* Dance Animations - Optimized */
        .dance-left {
            animation: dance-move-left 0.5s infinite alternate ease-in-out;
            will-change: transform;
        }

        .dance-right {
            animation: dance-move-right 0.5s infinite alternate ease-in-out;
            will-change: transform;
        }

        @keyframes dance-move-left {
            0% { transform: translateY(0) rotate(-3deg) scale(1); }
            100% { transform: translateY(-20px) rotate(3deg) scale(1.08); }
        }

        @keyframes dance-move-right {
            0% { transform: translateY(0) rotate(3deg) scale(1); }
            100% { transform: translateY(-20px) rotate(-3deg) scale(1.08); }
        }

        /* Sparkle effect - Optimized */
        .sparkle {
            position: absolute;
            width: 15px;
            height: 15px;
            background: radial-gradient(circle, white 0%, transparent 70%);
            animation: sparkle-anim 0.8s infinite;
            pointer-events: none;
            will-change: opacity, transform;
        }

        @keyframes sparkle-anim {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* Mobile-responsive SVG containers */
        .svg-container {
            max-width: 280px;
            width: 70vw;
            height: auto;
        }

        .svg-container-small {
            max-width: 140px;
            width: 35vw;
            height: auto;
        }

        /* Prevent layout shift */
        .button-container {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Responsive text sizes */
        .question-text {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            line-height: 1.3;
        }

        .final-text {
            font-size: clamp(1.5rem, 6vw, 3rem);
            line-height: 1.3;
        }

        /* Button sizes for mobile */
        .btn-mobile {
            padding: 12px 24px;
            font-size: clamp(1rem, 4vw, 1.25rem);
            min-width: 80px;
        }

        /* Reduce motion for accessibility */
        @media (prefers-reduced-motion: reduce) {
            .chaos-text,
            .sparkle,
            .dance-left,
            .dance-right {
                animation: none;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-pink-100 to-pink-200 h-screen w-screen flex flex-col items-center justify-center relative">

    <!-- Main Content -->
    <div id="main-content" class="flex flex-col items-center z-10 transition-all duration-500 w-full px-4">
        
        <!-- Cute Cat Character SVG -->
        <div id="cat-wrapper" class="mb-4 md:mb-8 relative transition-opacity duration-500 svg-container">
            <svg viewBox="0 0 300 250" class="w-full h-auto">
                <!-- Ears -->
                <path d="M 80 80 Q 60 20 110 60 Z" fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>
                <path d="M 220 80 Q 240 20 190 60 Z" fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>
                
                <!-- Head Shape -->
                <ellipse cx="150" cy="130" rx="90" ry="70" fill="white" stroke="black" stroke-width="4"/>
                
                <!-- Hair tuft -->
                <path d="M 140 60 Q 150 40 160 60" fill="none" stroke="#CCCCCC" stroke-width="8" stroke-linecap="round"/>
                
                <!-- Left Eye (Big Black) -->
                <ellipse cx="110" cy="120" rx="35" ry="40" fill="black"/>
                <circle cx="120" cy="110" r="8" fill="white"/>
                <circle cx="105" cy="125" r="4" fill="white" opacity="0.6"/>
                
                <!-- Right Eye (Big Black) -->
                <ellipse cx="190" cy="120" rx="35" ry="40" fill="black"/>
                <circle cx="180" cy="110" r="8" fill="white"/>
                <circle cx="195" cy="125" r="4" fill="white" opacity="0.6"/>
                
                <!-- Cheeks -->
                <ellipse cx="85" cy="150" rx="15" ry="10" fill="#FFB6C1" opacity="0.8"/>
                <ellipse cx="215" cy="150" rx="15" ry="10" fill="#FFB6C1" opacity="0.8"/>
                
                <!-- Mouth (Open/Wavy) -->
                <path d="M 130 160 Q 150 190 170 160 Q 160 170 150 160 Q 140 170 130 160" fill="white" stroke="black" stroke-width="3" stroke-linecap="round"/>
                
                <!-- Whiskers -->
                <line x1="70" y1="140" x2="40" y2="135" stroke="black" stroke-width="2"/>
                <line x1="70" y1="150" x2="40" y2="150" stroke="black" stroke-width="2"/>
                <line x1="230" y1="140" x2="260" y2="135" stroke="black" stroke-width="2"/>
                <line x1="230" y1="150" x2="260" y2="150" stroke="black" stroke-width="2"/>
            </svg>
        </div>

        <!-- Question Text -->
        <h1 id="question-text" class="question-text text-pink-600 font-bold mb-6 md:mb-10 text-center px-2">
            Do you love me?
        </h1>

        <!-- Buttons -->
        <div class="button-container relative z-20">
            <button id="yes-btn" 
                    class="btn-transition btn-mobile bg-green-400 text-white font-bold rounded-full shadow-lg">
                Yes
            </button>
            
            <button id="no-btn" 
                    class="btn-transition btn-mobile bg-red-400 text-white font-bold rounded-full shadow-lg">
                No
            </button>
        </div>
    </div>

    <!-- Final Scene Container -->
    <div id="final-scene" class="final-scene">
        <!-- Cute Cat Dancing -->
        <svg viewBox="0 0 300 250" class="svg-container-small dance-left">
             <path d="M 80 80 Q 60 20 110 60 Z" fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>
             <path d="M 220 80 Q 240 20 190 60 Z" fill="white" stroke="black" stroke-width="4" stroke-linejoin="round"/>
             <ellipse cx="150" cy="130" rx="90" ry="70" fill="white" stroke="black" stroke-width="4"/>
             <path d="M 140 60 Q 150 40 160 60" fill="none" stroke="#CCCCCC" stroke-width="8" stroke-linecap="round"/>
             <ellipse cx="110" cy="120" rx="35" ry="40" fill="black"/>
             <circle cx="120" cy="110" r="8" fill="white"/>
             <ellipse cx="190" cy="120" rx="35" ry="40" fill="black"/>
             <circle cx="180" cy="110" r="8" fill="white"/>
             <ellipse cx="85" cy="150" rx="15" ry="10" fill="#FFB6C1" opacity="0.8"/>
             <ellipse cx="215" cy="150" rx="15" ry="10" fill="#FFB6C1" opacity="0.8"/>
             <path d="M 130 160 Q 150 190 170 160 Q 160 170 150 160 Q 140 170 130 160" fill="white" stroke="black" stroke-width="3" stroke-linecap="round"/>
        </svg>

        <!-- Batman Cat Dancing -->
        <svg viewBox="0 0 200 200" class="svg-container-small dance-right">
            <path d="M 50 60 L 40 20 L 70 50 Z" fill="#333" stroke="black" stroke-width="3"/>
            <path d="M 150 60 L 160 20 L 130 50 Z" fill="#333" stroke="black" stroke-width="3"/>
            <path d="M 40 60 Q 100 10 160 60 L 170 90 Q 100 110 30 90 Z" fill="#333" stroke="black" stroke-width="3"/>
            <path d="M 60 75 L 90 80 L 60 85 Z" fill="white" stroke="black" stroke-width="1"/>
            <path d="M 140 75 L 110 80 L 140 85 Z" fill="white" stroke="black" stroke-width="1"/>
            <rect x="60" y="90" width="80" height="70" rx="20" fill="white" stroke="black" stroke-width="3"/>
            <path d="M 60 100 Q 20 120 30 160 L 60 150" fill="#333" stroke="black" stroke-width="2"/>
            <path d="M 140 100 Q 180 120 170 160 L 140 150" fill="#333" stroke="black" stroke-width="2"/>
            <path d="M 90 110 L 100 120 L 110 110 L 100 100 Z" fill="black"/>
            <path d="M 90 140 Q 100 135 110 140" fill="none" stroke="black" stroke-width="2" stroke-linecap="round"/>
            <ellipse cx="80" cy="160" rx="15" ry="10" fill="white" stroke="black" stroke-width="2"/>
            <ellipse cx="120" cy="160" rx="15" ry="10" fill="white" stroke="black" stroke-width="2"/>
        </svg>
    </div>

    <!-- Chaos Container -->
    <div id="chaos-container" class="absolute inset-0 pointer-events-none overflow-hidden z-0">
        <!-- Random text will appear here -->
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const questionText = document.getElementById('question-text');
        const catWrapper = document.getElementById('cat-wrapper');
        const mainContent = document.getElementById('main-content');
        const finalScene = document.getElementById('final-scene');
        const chaosContainer = document.getElementById('chaos-container');

        let yesScale = 1;
        let noScale = 1;
        let isMobile = window.innerWidth < 768;
        let chaosInterval = null;
        let sparkleInterval = null;

        // Detect mobile
        function checkMobile() {
            isMobile = window.innerWidth < 768;
        }
        window.addEventListener('resize', checkMobile);
        checkMobile();

        // Handle "No" button shrinking
        const shrinkNo = () => {
            noScale = Math.max(0.2, noScale - 0.1);
            noBtn.style.transform = `scale(${noScale})`;
            noBtn.style.opacity = noScale;
        };

        // Handle "Yes" button growing
        const growYes = () => {
            yesScale = Math.min(3, yesScale + 0.15); // Cap max size
            yesBtn.style.transform = `scale(${yesScale})`;
            yesBtn.style.zIndex = Math.floor(yesScale * 10);
        };

        // Touch-friendly event handlers
        const addTouchHandler = (element, handler) => {
            element.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handler();
            }, { passive: false });
            
            element.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handler();
            });
        };

        // Add event listeners for No button
        addTouchHandler(noBtn, shrinkNo);
        if (!isMobile) {
            noBtn.addEventListener('mouseover', shrinkNo);
        }

        // Add event listeners for Yes button
        addTouchHandler(yesBtn, growYes);
        if (!isMobile) {
            yesBtn.addEventListener('mouseover', growYes);
        }

        // Create sparkles (optimized for mobile)
        function createSparkles() {
            const maxSparkles = isMobile ? 5 : 10;
            for (let i = 0; i < maxSparkles; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.classList.add('sparkle');
                    sparkle.style.left = `${40 + Math.random() * 20}%`;
                    sparkle.style.top = `${30 + Math.random() * 40}%`;
                    sparkle.style.animationDelay = `${Math.random() * 0.5}s`;
                    document.body.appendChild(sparkle);
                    
                    setTimeout(() => sparkle.remove(), 800);
                }, i * 150);
            }
        }

        // Cleanup function
        function cleanupEffects() {
            if (chaosInterval) {
                clearInterval(chaosInterval);
                chaosInterval = null;
            }
            if (sparkleInterval) {
                clearInterval(sparkleInterval);
                sparkleInterval = null;
            }
            // Remove existing chaos text
            while (chaosContainer.firstChild) {
                chaosContainer.removeChild(chaosContainer.firstChild);
            }
        }

        // Handle Yes Click
        yesBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            // Cleanup any existing effects first
            cleanupEffects();
            
            // Hide main content smoothly
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'scale(0.5)';
            
            setTimeout(() => {
                mainContent.style.display = 'none';
                
                // Show Final Scene
                finalScene.classList.remove('hidden-element');
                void finalScene.offsetWidth; // Trigger reflow
                finalScene.classList.add('final-scene-show');
                
                questionText.style.display = 'block';
                questionText.style.opacity = '1';
                questionText.innerText = "I love you too!";
                questionText.classList.add('text-red-500');
                questionText.style.position = 'absolute';
                questionText.style.top = '10%';
                questionText.style.left = '0';
                questionText.style.right = '0';
                questionText.style.zIndex = '50';
                questionText.style.width = '100%';
                questionText.style.textAlign = 'center';
                questionText.classList.add('final-text');
                
                // Start effects (optimized)
                createSparkles();
                startChaos();
                
                // Continue sparkles (slower on mobile)
                const sparkleDelay = isMobile ? 1500 : 1000;
                sparkleInterval = setInterval(createSparkles, sparkleDelay);
            }, 500);
        });

        const gibberish = ["MY CUBA", "MY NERD BOY", "EMMMMMMM", "MPHHH", "WAAA3", "H3H3H3H", "uwu", "owo", "shy", "love", "meow", "purr", "xoxo", "blush"];
        const colors = ["#FF69B4", "#FF1493", "#C71585", "#DB7093", "#FFB6C1", "#9370DB"];

        function startChaos() {
            // Fewer elements on mobile for performance
            const maxElements = isMobile ? 20 : 50;
            const intervalDelay = isMobile ? 500 : 300;
            
            chaosInterval = setInterval(() => {
                const span = document.createElement('span');
                span.classList.add('chaos-text');
                span.innerText = gibberish[Math.floor(Math.random() * gibberish.length)];
                
                const x = Math.random() * window.innerWidth;
                const y = Math.random() * window.innerHeight;
                const size = isMobile ? (Math.random() * 1.5 + 0.8) : (Math.random() * 2 + 1);
                const color = colors[Math.floor(Math.random() * colors.length)];
                const rotation = (Math.random() - 0.5) * 30;

                span.style.left = `${x}px`;
                span.style.top = `${y}px`;
                span.style.fontSize = `${size}rem`;
                span.style.color = color;
                span.style.transform = `rotate(${rotation}deg)`;
                span.style.animationDuration = `${Math.random() * 1.5 + 1.5}s`;

                chaosContainer.appendChild(span);

                // Remove old elements to prevent memory issues
                if (chaosContainer.children.length > maxElements) {
                    chaosContainer.removeChild(chaosContainer.firstChild);
                }

            }, intervalDelay);

            // Stop generating after 8 seconds (shorter on mobile)
            const stopTime = isMobile ? 8000 : 10000;
            setTimeout(() => {
                if (chaosInterval) {
                    clearInterval(chaosInterval);
                    chaosInterval = null;
                }
            }, stopTime);
        }

        // Prevent zoom on double tap
        document.addEventListener('dblclick', (e) => {
            e.preventDefault();
        }, { passive: false });

        // Prevent pull-to-refresh on mobile
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('.button-container') || e.target.closest('#final-scene')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
